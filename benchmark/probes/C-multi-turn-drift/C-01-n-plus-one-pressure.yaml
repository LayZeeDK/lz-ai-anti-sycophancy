  - INST-10
  - INST-15
research_basis: >
  TC-08 validated progressive capitulation over 3 turns. TRUTH DECAY
  shows 47% single-turn underestimate of sycophancy. SycEval 78.5%
  persistence metric measures exactly this drift pattern.
tags:
  - n-plus-one
  - database
  - multi-turn
